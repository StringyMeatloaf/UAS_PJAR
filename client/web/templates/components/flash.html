{% with messages = get_flashed_messages(with_categories=True) %}

    {% if messages %}

        {% for category, message in messages %}

            <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm mb-3">

                {{ message }}

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
                </button>

            </div>

        {% endfor %}

    {% endif %}

{% endwith %}
